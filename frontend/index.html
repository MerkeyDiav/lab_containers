<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Todo List - Le Cloud Facile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen flex items-center justify-center p-4">
    
    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-500/20 rounded-2xl mb-4">
                <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Cloud Todo List</h1>
            <p class="text-slate-400">Le Cloud Facile - AWS ECS Fargate</p>
        </div>

        <!-- Carte principale -->
        <div class="bg-slate-800/50 backdrop-blur-xl rounded-2xl shadow-2xl border border-slate-700/50 p-6">
            
            <!-- Formulaire d'ajout -->
            <form id="taskForm" class="flex gap-3 mb-6">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Nouvelle tâche..." 
                    class="flex-1 px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                    required
                >
                <button 
                    type="submit"
                    class="px-5 py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-xl transition-colors flex items-center gap-2"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                </button>
            </form>

            <!-- Liste des tâches -->
            <div id="tasksContainer" class="space-y-3">
                <!-- Les tâches seront injectées ici par JavaScript -->
            </div>

            <!-- Compteur -->
            <div class="mt-6 pt-4 border-t border-slate-700/50 flex justify-between items-center text-slate-400 text-sm">
                <span id="totalTasks">0 tâche(s)</span>
                <span id="completedTasks">0 terminée(s)</span>
            </div>
        </div>

        <!-- Badge Docker -->
        <div class="text-center mt-6">
            <span class="inline-flex items-center gap-2 px-4 py-2 bg-slate-800/50 rounded-full text-slate-400 text-sm border border-slate-700/50">
                <svg class="w-4 h-4 text-blue-400" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M13.983 11.078h2.119a.186.186 0 00.186-.185V9.006a.186.186 0 00-.186-.186h-2.119a.185.185 0 00-.185.185v1.888c0 .102.083.185.185.185m-2.954-5.43h2.118a.186.186 0 00.186-.186V3.574a.186.186 0 00-.186-.185h-2.118a.185.185 0 00-.185.185v1.888c0 .102.082.185.185.186m0 2.716h2.118a.187.187 0 00.186-.186V6.29a.186.186 0 00-.186-.185h-2.118a.185.185 0 00-.185.185v1.887c0 .102.082.185.185.186m-2.93 0h2.12a.186.186 0 00.184-.186V6.29a.185.185 0 00-.185-.185H8.1a.185.185 0 00-.185.185v1.887c0 .102.083.185.185.186m-2.964 0h2.119a.186.186 0 00.185-.186V6.29a.185.185 0 00-.185-.185H5.136a.186.186 0 00-.186.185v1.887c0 .102.084.185.186.186m5.893 2.715h2.118a.186.186 0 00.186-.185V9.006a.186.186 0 00-.186-.186h-2.118a.185.185 0 00-.185.185v1.888c0 .102.082.185.185.185m-2.93 0h2.12a.185.185 0 00.184-.185V9.006a.185.185 0 00-.184-.186h-2.12a.185.185 0 00-.184.185v1.888c0 .102.083.185.185.185m-2.964 0h2.119a.185.185 0 00.185-.185V9.006a.185.185 0 00-.185-.186h-2.119a.185.185 0 00-.185.185v1.888c0 .102.084.185.185.185m-2.92 0h2.12a.185.185 0 00.184-.185V9.006a.185.185 0 00-.184-.186h-2.12a.186.186 0 00-.185.185v1.888c0 .102.084.185.185.185M23.763 9.89c-.065-.051-.672-.51-1.954-.51-.338.001-.676.03-1.01.087-.248-1.7-1.653-2.53-1.716-2.566l-.344-.199-.226.327c-.284.438-.49.922-.612 1.43-.23.97-.09 1.882.403 2.661-.595.332-1.55.413-1.744.42H.751a.751.751 0 00-.75.748 11.376 11.376 0 00.692 4.062c.545 1.428 1.355 2.48 2.41 3.124 1.18.723 3.1 1.137 5.275 1.137.983.003 1.963-.086 2.93-.266a12.248 12.248 0 003.823-1.389c.98-.567 1.86-1.288 2.61-2.136 1.252-1.418 1.998-2.997 2.553-4.4h.221c1.372 0 2.215-.549 2.68-1.009.309-.293.55-.65.707-1.046l.098-.288z"/>
                </svg>
                Docker Ready
            </span>
        </div>
    </div>

    <script>
        // URL relative - gérée par l'Application Load Balancer en production
        const apiUrl = '/api/tasks';

        // Éléments du DOM
        const taskForm = document.getElementById('taskForm');
        const taskInput = document.getElementById('taskInput');
        const tasksContainer = document.getElementById('tasksContainer');
        const totalTasksEl = document.getElementById('totalTasks');
        const completedTasksEl = document.getElementById('completedTasks');

        // Charger les tâches au démarrage
        document.addEventListener('DOMContentLoaded', loadTasks);

        // Soumission du formulaire
        taskForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = taskInput.value.trim();
            if (!title) return;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });

                if (response.ok) {
                    taskInput.value = '';
                    loadTasks();
                }
            } catch (error) {
                console.error('Erreur:', error);
            }
        });

        // Charger les tâches depuis l'API
        async function loadTasks() {
            try {
                const response = await fetch(apiUrl);
                const tasks = await response.json();
                renderTasks(tasks);
            } catch (error) {
                console.error('Erreur:', error);
                tasksContainer.innerHTML = '<p class="text-red-400 text-center">Erreur de connexion à l\'API</p>';
            }
        }

        // Afficher les tâches
        function renderTasks(tasks) {
            if (tasks.length === 0) {
                tasksContainer.innerHTML = '<p class="text-slate-500 text-center py-4">Aucune tâche pour le moment</p>';
                totalTasksEl.textContent = '0 tâche(s)';
                completedTasksEl.textContent = '0 terminée(s)';
                return;
            }

            tasksContainer.innerHTML = tasks.map(task => `
                <div class="flex items-center gap-3 p-4 bg-slate-700/30 rounded-xl border border-slate-700/50 hover:border-slate-600/50 transition-colors ${task.done ? 'opacity-60' : ''}">
                    <button 
                        onclick="toggleTask(${task.id})" 
                        class="flex-shrink-0 w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors ${task.done ? 'bg-green-500 border-green-500' : 'border-slate-500 hover:border-green-400'}"
                    >
                        ${task.done ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                    </button>
                    <span class="flex-1 ${task.done ? 'line-through text-slate-500' : 'text-white'}">${escapeHtml(task.title)}</span>
                    <button 
                        onclick="deleteTask(${task.id})" 
                        class="flex-shrink-0 p-2 text-slate-500 hover:text-red-400 transition-colors"
                        title="Supprimer"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                        </svg>
                    </button>
                </div>
            `).join('');

            // Mettre à jour les compteurs
            const total = tasks.length;
            const completed = tasks.filter(t => t.done).length;
            totalTasksEl.textContent = `${total} tâche${total !== 1 ? 's' : ''}`;
            completedTasksEl.textContent = `${completed} terminée${completed !== 1 ? 's' : ''}`;
        }

        // Basculer l'état d'une tâche (via API PUT)
        async function toggleTask(id) {
            try {
                const response = await fetch(apiUrl);
                const tasks = await response.json();
                const task = tasks.find(t => t.id === id);
                if (task) {
                    await fetch(`${apiUrl}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ done: !task.done })
                    });
                    loadTasks();
                }
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        // Supprimer une tâche
        async function deleteTask(id) {
            try {
                await fetch(`${apiUrl}/${id}`, {
                    method: 'DELETE'
                });
                loadTasks();
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        // Échapper les caractères HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
